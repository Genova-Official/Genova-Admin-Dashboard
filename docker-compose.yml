version: '3.8'

services:
  console-web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/console}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: always

# Note: The main Genova backend is assumed to be running separately 
# as per the instruction to keep it as the primary source of truth.
